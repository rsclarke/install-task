name: "Install go-task/task"
description: "Downloads and installs go-task/task binary to the tool cache with mandatory checksum verification (Linux/macOS only)"
author: "rsclarke"
branding:
  icon: "package"
  color: "blue"

inputs:
  version:
    description: "Version of go-task/task to install (e.g., v3.29.1). If not specified, latest release will be used."
    required: false
    default: ""
  use-cache:
    description: "Whether to restore and save the GitHub Actions cache for the Task tool cache."
    required: false
    default: "true"

outputs:
  task_path:
    description: "Path to the installed task binary"
    value: ${{ steps.resolve-install-dir.outputs.install-dir }}

runs:
  using: "composite"
  steps:
    - name: Resolve version
      id: resolve-version
      shell: bash
      run: |
        if [[ -n "${INPUTS_VERSION}" ]]; then
          TASK_VERSION="${INPUTS_VERSION}"
        else
          echo "No version specified, fetching latest release..."

          LATEST_RELEASE=$(curl -fsSL -H "Authorization: Bearer ${{ github.token }}" https://api.github.com/repos/go-task/task/releases/latest)

          if [[ $? -eq 0 && -n "${LATEST_RELEASE}" ]]; then
            TASK_VERSION=$(echo "${LATEST_RELEASE}" | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
          fi

          if [[ -z "${TASK_VERSION}" ]]; then
            echo "Failed to resolve latest release version"
            exit 1
          fi
        fi

        # Ensure version has v prefix
        if [[ "${TASK_VERSION}" != v* ]]; then
          TASK_VERSION="v${TASK_VERSION}"
        fi

        if [[ ! "${TASK_VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
          echo "Invalid Task version: ${TASK_VERSION}"
          exit 1
        fi

        echo "Resolved Task version: ${TASK_VERSION}"
        echo "version=${TASK_VERSION}" >> $GITHUB_OUTPUT
        echo "version-without-v=${TASK_VERSION#v}" >> $GITHUB_OUTPUT
      env:
        INPUTS_VERSION: ${{ inputs.version }}

    - name: Restore tool cache
      if: inputs.use-cache == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ${{ runner.tool_cache }}/task
        key: install-task-${{ runner.os }}-${{ runner.arch }}-${{ steps.resolve-version.outputs.version }}

    - name: Resolve install directory
      id: resolve-install-dir
      shell: bash
      run: |
        case "$RUNNER_OS" in
          macOS)  OS="darwin" ;;
          Linux)  OS="linux" ;;
          *)
            echo "Unsupported OS: $RUNNER_OS"
            exit 1
            ;;
        esac

        case "$RUNNER_ARCH" in
          X64)   ARCH="amd64" ;;
          ARM64) ARCH="arm64" ;;
          *)
            echo "Unsupported architecture: $RUNNER_ARCH"
            exit 1
            ;;
        esac

        VERSION_WITHOUT_V="${STEPS_RESOLVE_VERSION_OUTPUTS_VERSION_WITHOUT_V}"
        INSTALL_DIR="${RUNNER_TOOL_CACHE}/task/${VERSION_WITHOUT_V}/${ARCH}"

        echo "os=${OS}" >> $GITHUB_OUTPUT
        echo "arch=${ARCH}" >> $GITHUB_OUTPUT
        echo "install-dir=${INSTALL_DIR}" >> $GITHUB_OUTPUT
      env:
        STEPS_RESOLVE_VERSION_OUTPUTS_VERSION_WITHOUT_V: ${{ steps.resolve-version.outputs.version-without-v }}

    - name: Check for cached task
      id: check-task
      if: inputs.use-cache == 'true'
      shell: bash
      run: |
        VERSION_WITHOUT_V="${STEPS_RESOLVE_VERSION_OUTPUTS_VERSION_WITHOUT_V}"
        INSTALL_DIR="${STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_INSTALL_DIR}"
        COMPLETE_MARKER="${RUNNER_TOOL_CACHE}/task/${VERSION_WITHOUT_V}/${STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_ARCH}.complete"

        if [[ -f "${COMPLETE_MARKER}" && -f "${INSTALL_DIR}/task" && -x "${INSTALL_DIR}/task" ]]; then
          echo "Found cached Task ${VERSION_WITHOUT_V} at ${INSTALL_DIR}"
          echo "found=true" >> $GITHUB_OUTPUT
        else
          echo "No cached Task ${VERSION_WITHOUT_V} found"
          echo "found=false" >> $GITHUB_OUTPUT
          mkdir -p "${INSTALL_DIR}"
        fi
      env:
        STEPS_RESOLVE_VERSION_OUTPUTS_VERSION_WITHOUT_V: ${{ steps.resolve-version.outputs.version-without-v }}
        STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_INSTALL_DIR: ${{ steps.resolve-install-dir.outputs.install-dir }}
        STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_ARCH: ${{ steps.resolve-install-dir.outputs.arch }}

    - name: Download and verify task
      if: inputs.use-cache != 'true' || steps.check-task.outputs.found != 'true'
      shell: bash
      run: |
        OS="${STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_OS}"
        ARCH="${STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_ARCH}"
        INSTALL_DIR="${STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_INSTALL_DIR}"
        TASK_VERSION="${STEPS_RESOLVE_VERSION_OUTPUTS_VERSION}"
        VERSION_WITHOUT_V="${STEPS_RESOLVE_VERSION_OUTPUTS_VERSION_WITHOUT_V}"

        mkdir -p "${INSTALL_DIR}"

        # Determine checksum command
        case "$RUNNER_OS" in
          macOS) CHECKSUM_CMD="shasum -a 256" ;;
          Linux) CHECKSUM_CMD="sha256sum" ;;
        esac

        TASK_DIST="task_${OS}_${ARCH}"
        DOWNLOAD_URL="https://github.com/go-task/task/releases/download/${TASK_VERSION}/${TASK_DIST}.tar.gz"
        CHECKSUMS_URL="https://github.com/go-task/task/releases/download/${TASK_VERSION}/task_checksums.txt"

        TEMP_DIR=$(mktemp -d)

        echo "Downloading from: ${DOWNLOAD_URL}"
        curl -fsSL "${DOWNLOAD_URL}" -o "${TEMP_DIR}/task.tar.gz"
        if [[ $? -ne 0 ]]; then
          echo "Failed to download Task from ${DOWNLOAD_URL}"
          exit 1
        fi

        echo "Verifying checksum..."
        curl -fsSL "${CHECKSUMS_URL}" -o "${TEMP_DIR}/task_checksums.txt"
        if [[ $? -ne 0 ]]; then
          echo "Failed to download checksums from ${CHECKSUMS_URL}"
          exit 1
        fi

        EXPECTED_CHECKSUM=$(grep "${TASK_DIST}.tar.gz" "${TEMP_DIR}/task_checksums.txt" | awk '{print $1}')
        if [[ -z "${EXPECTED_CHECKSUM}" ]]; then
          echo "Failed to find checksum for ${TASK_DIST}.tar.gz in checksums file"
          exit 1
        fi

        ACTUAL_CHECKSUM=$(cd "${TEMP_DIR}" && ${CHECKSUM_CMD} task.tar.gz | awk '{print $1}')
        if [[ "${EXPECTED_CHECKSUM}" != "${ACTUAL_CHECKSUM}" ]]; then
          echo "Checksum verification failed!"
          echo "Expected: ${EXPECTED_CHECKSUM}"
          echo "Actual: ${ACTUAL_CHECKSUM}"
          echo "Security verification failed - aborting installation"
          exit 1
        fi

        echo "Checksum verified successfully"

        tar -xzf "${TEMP_DIR}/task.tar.gz" -C "${TEMP_DIR}"
        mv "${TEMP_DIR}/task" "${INSTALL_DIR}/"
        chmod +x "${INSTALL_DIR}/task"
        rm -rf "${TEMP_DIR}"

        touch "${RUNNER_TOOL_CACHE}/task/${VERSION_WITHOUT_V}/${ARCH}.complete"

        echo "Installed Task ${TASK_VERSION} to ${INSTALL_DIR}"
      env:
        STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_OS: ${{ steps.resolve-install-dir.outputs.os }}
        STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_ARCH: ${{ steps.resolve-install-dir.outputs.arch }}
        STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_INSTALL_DIR: ${{ steps.resolve-install-dir.outputs.install-dir }}
        STEPS_RESOLVE_VERSION_OUTPUTS_VERSION: ${{ steps.resolve-version.outputs.version }}
        STEPS_RESOLVE_VERSION_OUTPUTS_VERSION_WITHOUT_V: ${{ steps.resolve-version.outputs.version-without-v }}

    - name: Add task to PATH
      shell: bash
      run: | # zizmor: ignore[github-env] install-dir is computed from trusted runner paths, validated semver, and fixed arch
        echo "${STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_INSTALL_DIR}" >> $GITHUB_PATH
        echo "task_path=${STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_INSTALL_DIR}" >> $GITHUB_OUTPUT
      env:
        STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_INSTALL_DIR: ${{ steps.resolve-install-dir.outputs.install-dir }}

    - name: Verify task installation
      shell: bash
      run: |
        echo "Task installed at: ${STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_INSTALL_DIR}"
        "${STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_INSTALL_DIR}/task" --version
      env:
        STEPS_RESOLVE_INSTALL_DIR_OUTPUTS_INSTALL_DIR: ${{ steps.resolve-install-dir.outputs.install-dir }}
